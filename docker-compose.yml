services:
  # ============================================================
  # Core data services
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: prephub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prephub}
      POSTGRES_USER: ${POSTGRES_USER:-prephub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prephub_dev_pw}
    command: >
      postgres
      -c shared_buffers=16GB
      -c effective_cache_size=48GB
      -c maintenance_work_mem=2GB
      -c work_mem=64MB
      -c max_connections=200
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c max_worker_processes=12
      -c max_parallel_workers=12
      -c max_parallel_workers_per_gather=4
      -c wal_buffers=16MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c checkpoint_completion_target=0.9
      -c log_min_duration_statement=500
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    deploy:
      resources:
        limits:
          memory: 24G
          cpus: "4"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prephub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [prephub-net]

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: prephub-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.name=prephub-cluster
      - node.name=prephub-es-01
      - ES_JAVA_OPTS=-Xms16g -Xmx16g
      - bootstrap.memory_lock=true
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    deploy:
      resources:
        limits:
          memory: 32G
          cpus: "4"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [prephub-net]

  redis:
    image: redis:7.4-alpine
    container_name: prephub-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [prephub-net]

  minio:
    image: minio/minio:latest
    container_name: prephub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-prephub}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-prephub_dev_pw}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [prephub-net]

  minio-init:
    image: minio/mc:latest
    container_name: prephub-minio-init
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-prephub} ${MINIO_ROOT_PASSWORD:-prephub_dev_pw};
      mc mb --ignore-existing local/avatars;
      mc mb --ignore-existing local/attachments;
      mc anonymous set download local/avatars;
      exit 0;
      "
    networks: [prephub-net]

  # ============================================================
  # Monitoring stack
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prephub-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits: { memory: 4G, cpus: "1" }
    networks: [prephub-net]

  grafana:
    image: grafana/grafana:latest
    container_name: prephub-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      resources:
        limits: { memory: 1G, cpus: "1" }
    depends_on: [prometheus, loki]
    networks: [prephub-net]

  loki:
    image: grafana/loki:latest
    container_name: prephub-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    deploy:
      resources:
        limits: { memory: 2G, cpus: "1" }
    networks: [prephub-net]

  promtail:
    image: grafana/promtail:latest
    container_name: prephub-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on: [loki]
    networks: [prephub-net]

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: prephub-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    deploy:
      resources:
        limits: { memory: 2G, cpus: "1" }
    networks: [prephub-net]

  # ============================================================
  # Exporters
  # ============================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: prephub-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-prephub}:${POSTGRES_PASSWORD:-prephub_dev_pw}@postgres:5432/${POSTGRES_DB:-prephub}?sslmode=disable"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [prephub-net]

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: prephub-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on: [redis]
    networks: [prephub-net]

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:latest
    container_name: prephub-es-exporter
    restart: unless-stopped
    command:
      - "--es.uri=http://elasticsearch:9200"
      - "--es.all"
      - "--es.indices"
    depends_on: [elasticsearch]
    networks: [prephub-net]

  node-exporter:
    image: prom/node-exporter:latest
    container_name: prephub-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    pid: host
    networks: [prephub-net]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: prephub-cadvisor
    restart: unless-stopped
    privileged: true
    devices: ["/dev/kmsg"]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks: [prephub-net]

volumes:
  postgres_data:
  elasticsearch_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  prephub-net:
    driver: bridge
