bind 0.0.0.0
protected-mode no
port 6379
timeout 0
tcp-keepalive 300

# Memory and eviction
maxmemory 3gb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Performance
io-threads 4
io-threads-do-reads yes

# Slowlog
slowlog-log-slower-than 10000
slowlog-max-len 128
