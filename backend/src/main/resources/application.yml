spring:
  application:
    name: prephub-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/prephub}
    username: ${POSTGRES_USER:prephub}
    password: ${POSTGRES_PASSWORD:prephub_dev_pw}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        jdbc.batch_size: 30
        order_inserts: true
        order_updates: true
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4
    elasticsearch:
      repositories:
        enabled: true

  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}
    connection-timeout: 5s
    socket-timeout: 30s

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080
  compression:
    enabled: true
  tomcat:
    threads:
      max: 200
      min-spare: 20
  error:
    include-message: always
    include-binding-errors: always

# Actuator + observability
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers,env,caches
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${JAEGER_ENDPOINT:http://localhost:4318/v1/traces}

app:
  jwt:
    secret: ${JWT_SECRET:change_me_to_a_long_random_string_at_least_32_chars_for_HS256}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    issuer: prephub
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-url: ${MINIO_PUBLIC_URL:http://localhost:9000}
    access-key: ${MINIO_ROOT_USER:prephub}
    secret-key: ${MINIO_ROOT_PASSWORD:prephub_dev_pw}
    avatar-bucket: avatars
    attachment-bucket: attachments
  cache:
    search-ttl-seconds: 60
    hot-topics-ttl-seconds: 300

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.prephub: DEBUG
    org.springframework.security: INFO
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
    level: "%5p ${LOGGING_PATTERN_CORRELATION:}"
